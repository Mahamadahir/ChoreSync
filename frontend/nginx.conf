server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html for Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets (they have content-hash filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
