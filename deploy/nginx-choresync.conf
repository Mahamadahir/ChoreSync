server {
    listen 80;
    server_name localhost;

    # Frontend SPA — built output
    root /home/mahamad/Projects/ChoreSync/frontend/dist;
    index index.html;

    # Backend — API, admin, static files (WhiteNoise serves /static/)
    location ~ ^/(api|admin|static|media)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;  # tell Django it's HTTPS
        proxy_read_timeout 60s;
    }

    # WebSocket — Django Channels (group chat, SSE relay)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400s;  # keep WS connections alive
    }

    # SPA fallback — Vue Router handles all other paths
    location / {
        try_files $uri /index.html;
    }
}
