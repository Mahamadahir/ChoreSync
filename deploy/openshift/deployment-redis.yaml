apiVersion: apps/v1
kind: Deployment
metadata:
  name: choresync-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: choresync-redis
  template:
    metadata:
      labels:
        app: choresync-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args: ["--save", ""]   # disable RDB persistence — ephemeral broker
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: choresync-redis
spec:
  selector:
    app: choresync-redis
  ports:
    - port: 6379
      targetPort: 6379
